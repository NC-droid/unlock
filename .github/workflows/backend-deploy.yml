name: Deploy Backend API to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (including devDependencies for TypeScript build)
        working-directory: ./backend
        run: npm install
        env:
          NODE_ENV: development

      - name: Run linting
        working-directory: ./backend
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests
        working-directory: ./backend
        run: npm run test --if-present
        continue-on-error: true

      - name: Build backend
        working-directory: ./backend
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL:                    ${{ secrets.DATABASE_URL }}
          AZURE_TENANT_ID:                 ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:                 ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_NAME:               ${{ secrets.AZURE_TENANT_NAME }}
          AZURE_STORAGE_ACCOUNT_NAME:      ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}

      - name: Deploy to Azure App Service
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: './backend'

      - name: Verify deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Backend API deployed to:"
          echo "https://${{ secrets.AZURE_APP_SERVICE_NAME }}.azurewebsites.net"
